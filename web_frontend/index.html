<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNS 快速导入</title>
    <style>
        :root {
            --bg-base: #1e1e2e;
            --bg-surface: #181825;
            --bg-overlay: #313244;
            --text-primary: #cdd6f4;
            --text-secondary: #a6adc8;
            --text-muted: #6c7086;
            --accent-blue: #89b4fa;
            --accent-green: #a6e3a1;
            --accent-red: #f38ba8;
            --accent-yellow: #f9e2af;
            --accent-mauve: #cba6f7;
            --accent-peach: #fab387;
            --border-color: #45475a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --radius: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        html { background: var(--bg-base); }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-base); color: var(--text-primary);
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .app-header {
            flex-shrink: 0;
            background: var(--bg-surface); border-bottom: 1px solid var(--border-color);
            padding: 0 28px; display: flex; align-items: center;
            height: 52px; gap: 16px;
        }
        .app-title {
            font-size: 18px; font-weight: 700; color: var(--accent-blue);
            display: flex; align-items: center; gap: 10px; white-space: nowrap;
        }
        .app-title svg { width: 22px; height: 22px; stroke: var(--accent-blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .app-body {
            flex: 1; min-height: 0; overflow: hidden;
            display: flex; flex-direction: column;
        }

        .btn {
            padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer;
            font-size: 13px; font-weight: 500; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        .btn-primary { background: var(--accent-blue); color: #1e1e2e; }
        .btn-primary:hover { background: #74c7ec; transform: translateY(-1px); }
        .btn-success { background: var(--accent-green); color: #1e1e2e; }
        .btn-success:hover { background: #94e2d5; }
        .btn-danger { background: var(--accent-red); color: #1e1e2e; }
        .btn-danger:hover { background: #eba0ac; }
        .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-ghost:hover { background: var(--bg-overlay); color: var(--text-primary); }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .main-split {
            flex: 1; min-height: 0; display: flex; gap: 16px; padding: 16px;
            overflow: hidden;
        }

        .main-left {
            width: 45%; min-width: 0;
            display: flex; flex-direction: column; gap: 12px;
            overflow-y: auto; overflow-x: hidden;
        }

        .main-right {
            width: 55%; min-width: 0;
            display: flex; flex-direction: column; gap: 0;
            overflow: hidden;
        }

        /* 导入输入区 */
        .import-input-section { flex-shrink: 0; }
        .import-input-section .form-group { margin-bottom: 10px; }
        .import-input-section .form-label { margin-bottom: 4px; }

        .dns-import-dropzone {
            padding: 10px; border: 2px dashed var(--border-color);
            border-radius: var(--radius); background: var(--bg-surface); color: var(--text-muted);
            font-size: 13px; line-height: 1.6; transition: var(--transition); cursor: default;
        }
        .dns-import-dropzone.is-dragover { border-color: var(--accent-blue); background: rgba(137, 180, 250, 0.08); color: var(--accent-blue); }
        .dns-import-dropzone-content { display: grid; grid-template-columns: 1.2fr 1fr; gap: 10px; align-items: stretch; }
        .dns-import-dropzone-text { display: flex; flex-direction: column; justify-content: center; gap: 6px; text-align: left; padding: 2px 4px; }
        .dns-import-dropzone-preview {
            border: 1px solid var(--border-color); border-radius: 8px; height: 100px;
            display: flex; align-items: center; justify-content: center; overflow: hidden; background: #11111b;
        }
        .dns-import-dropzone-preview img { max-width: 100%; max-height: 96px; object-fit: contain; display: none; }
        .dns-import-dropzone.has-image .dns-import-dropzone-preview img { display: block; }
        .dns-import-dropzone.has-image #dns-import-image-placeholder { display: none; }
        #dns-import-image-placeholder { font-size: 12px; color: var(--text-muted); }

        .import-input-actions {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center;
            margin-top: 8px; flex-shrink: 0;
        }

        .import-log-section {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .import-log-section.hidden { display: none; }
        .import-log-section .section-label {
            font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; flex-shrink: 0;
        }

        .ai-log-output {
            flex: 1; min-height: 60px; padding: 12px;
            background: #11111b; border: 1px solid var(--border-color); border-radius: var(--radius);
            color: var(--accent-green); font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 12px; line-height: 1.5; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
        }

        .ai-config-status {
            flex-shrink: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 14px 16px;
        }
        .ai-config-status-title {
            font-size: 13px; font-weight: 600; color: var(--text-primary);
            margin: 0 0 10px 0; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);
        }
        .ai-config-status-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 6px 0; border-bottom: 1px solid var(--border-color);
        }
        .ai-config-status-row:last-child { border-bottom: none; }
        .ai-config-status-label { font-size: 12px; color: var(--text-secondary); }
        .ai-config-status-value { font-size: 12px; color: var(--text-primary); }
        .ai-config-status-value.configured { color: var(--accent-green); }
        .ai-config-status-value.not-configured { color: var(--accent-red); }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-input, .form-select {
            width: 100%; padding: 9px 12px; background: var(--bg-overlay);
            border: 1px solid var(--border-color); border-radius: var(--radius);
            color: var(--text-primary); font-size: 13px; outline: none; transition: var(--transition);
        }
        .form-input:focus, .form-select:focus { border-color: var(--accent-blue); }
        .form-input::placeholder { color: var(--text-muted); }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 10px 18px; border-radius: var(--radius); font-size: 13px; color: #1e1e2e; transform: translateX(120%); transition: all 0.3s ease; box-shadow: var(--shadow); max-width: 360px; }
        .toast-show { transform: translateX(0); }
        .toast-hide { transform: translateX(120%); opacity: 0; }
        .toast-success { background: var(--accent-green); }
        .toast-error { background: var(--accent-red); }
        .toast-info { background: var(--accent-blue); }

        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(137, 180, 250, 0.25); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .center-loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 40px; color: var(--text-muted); font-size: 13px; }

        .import-right-placeholder {
            flex: 1; min-height: 0;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 14px;
            border: 1px dashed var(--border-color); border-radius: var(--radius-lg);
        }
        .import-right-placeholder.hidden { display: none; }

        .import-records-wrapper {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .import-records-wrapper.hidden { display: none; }

        .import-records-header {
            flex-shrink: 0;
            font-size: 13px; color: var(--text-secondary);
            margin-bottom: 10px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
        }
        .import-records-count { color: var(--accent-blue); font-weight: 600; }

        .import-records-list {
            flex: 1; min-height: 0; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
            padding-right: 4px;
        }

        .import-actions {
            flex-shrink: 0;
            padding-top: 12px; margin-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            flex-wrap: wrap;
        }
        .import-skip-info { font-size: 12px; color: var(--text-muted); }

        .dns-import-card { border: 1px solid var(--border-color); border-radius: var(--radius); padding: 10px 12px; background: var(--bg-base); transition: var(--transition); }
        .dns-import-card.record-skipped { opacity: 0.5; }
        .dns-import-card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);
        }
        .dns-import-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; margin-bottom: 8px; }
        .dns-import-row:last-child { margin-bottom: 0; }
        .dns-import-row-2 { grid-template-columns: minmax(80px, 1fr) minmax(120px, 2fr) 72px 32px; align-items: end; }
        .dns-import-field label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
        .dns-import-field .form-input, .dns-import-field .form-select { width: 100%; padding: 5px 7px; font-size: 12px; box-sizing: border-box; }
        .dns-import-field-action { display: flex; align-items: flex-end; justify-content: center; padding-bottom: 2px; }

        .skip-checkbox {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none;
        }
        .skip-checkbox input[type="checkbox"] { accent-color: var(--accent-blue); cursor: pointer; }

        .status-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600; line-height: 1.4;
        }
        .status-badge.status-exists { background: rgba(166, 227, 161, 0.15); color: var(--accent-green); }
        .status-badge.status-conflict { background: rgba(249, 226, 175, 0.15); color: var(--accent-yellow); }
        .status-badge.status-duplicate { background: rgba(249, 226, 175, 0.15); color: var(--accent-yellow); }
        .status-badge.status-new { background: rgba(137, 180, 250, 0.15); color: var(--accent-blue); }
        .status-badge.status-imported { background: rgba(166, 227, 161, 0.15); color: var(--accent-green); }
        .status-badge.status-failed { background: rgba(243, 139, 168, 0.15); color: var(--accent-red); }
        .dns-import-card.record-skipped.is-duplicate { border-color: rgba(249, 226, 175, 0.35); }

        .dns-provider-info {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; color: var(--text-secondary);
            padding: 4px 10px; background: var(--bg-overlay);
            border-radius: var(--radius); border: 1px solid var(--border-color);
        }
        .dns-provider-info .provider-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .provider-dot-ali { background: var(--accent-blue); }
        .provider-dot-dnspod { background: var(--accent-green); }
        .provider-dot-tencent { background: var(--accent-mauve); }

        /* 阻塞弹窗 */
        .block-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .block-overlay.block-active { display: flex; }
        .block-modal {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 24px 32px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            box-shadow: var(--shadow);
        }
        .block-modal .loading-spinner { width: 32px; height: 32px; border-width: 3px; }
        .block-modal-text { font-size: 14px; color: var(--text-secondary); }

        @media (max-width: 767px) {
            .app-header { padding: 0 16px; }
            .main-split { flex-direction: column; padding: 12px; gap: 12px; overflow-y: auto; }
            .main-left, .main-right { width: 100%; overflow-y: visible; flex-shrink: 0; }
            .import-log-section { flex: 0 0 auto; min-height: 80px; }
            .import-records-list { flex: 0 0 auto; max-height: 50vh; overflow-y: auto; }
            .main-right { flex: 1; min-height: 0; overflow: visible; }
            .import-records-wrapper { overflow: visible; }
            .dns-import-row-2 { grid-template-columns: minmax(60px, 1fr) minmax(100px, 2fr) 60px 28px; }
            .dns-import-field .form-input, .dns-import-field .form-select { font-size: 11px; padding: 4px 5px; }
            .toast-container { top: 10px; right: 10px; left: 10px; }
            .toast { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-title">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            DNS 快速导入
        </div>
    </header>

    <div class="app-body">
        <div class="main-split">
            <div class="main-left">
                <!-- AI 解析输入区 -->
                <div class="import-input-section">
                    <div class="form-group">
                        <label class="form-label">粘贴记录文本或截图（Ctrl+V / 拖拽）</label>
                        <textarea class="form-input" id="dns-import-text" rows="4" placeholder="直接粘贴阿里云/腾讯云表格文字（含校验域名、主机记录、记录类型、记录值），或粘贴 JSON；截图可拖到下方"></textarea>
                    </div>
                    <div class="dns-import-dropzone" id="dns-import-dropzone">
                        <div class="dns-import-dropzone-content">
                            <div class="dns-import-dropzone-text">
                                <div>左侧粘贴文字，右侧放截图</div>
                                <div style="font-size:12px;opacity:0.85">支持 PNG / JPG / WEBP / GIF</div>
                            </div>
                            <div class="dns-import-dropzone-preview">
                                <img id="dns-import-image-preview" alt="待识别截图">
                                <span id="dns-import-image-placeholder">未附加图片</span>
                            </div>
                        </div>
                    </div>
                    <div class="import-input-actions">
                        <div style="display:flex;flex-wrap:wrap;gap:8px">
                            <button type="button" class="btn btn-ghost btn-sm" id="btn-dns-import-pick-image">选择图片</button>
                            <button type="button" class="btn btn-ghost btn-sm" id="btn-dns-import-clear-image">移除图片</button>
                        </div>
                        <button type="button" class="btn btn-primary btn-sm" id="btn-dns-import-parse" onclick="runDnsImportParse()">解析并预览</button>
                    </div>
                    <input type="file" id="dns-import-file-input" accept="image/*" style="display:none">
                </div>

                <div class="import-log-section hidden" id="dns-import-log-section">
                    <div class="section-label">识别日志</div>
                    <div class="ai-log-output" id="dns-import-log-output"></div>
                </div>

                <div class="ai-config-status">
                    <h2 class="ai-config-status-title">AI 解析配置</h2>
                    <div class="ai-config-status-row">
                        <span class="ai-config-status-label">API 状态</span>
                        <span class="ai-config-status-value" id="ai-config-api-status">加载中...</span>
                    </div>
                    <div class="ai-config-status-row">
                        <span class="ai-config-status-label">模型</span>
                        <span class="ai-config-status-value" id="ai-config-model">-</span>
                    </div>
                    <div class="ai-config-status-row">
                        <span class="ai-config-status-label">AI 解析</span>
                        <span class="ai-config-status-value" id="ai-config-enabled">-</span>
                    </div>
                    <div class="ai-config-status-row">
                        <span class="ai-config-status-label">导入日志</span>
                        <span class="ai-config-status-value" id="import-log-path" style="font-size:11px;word-break:break-all;text-align:right;max-width:65%">加载中...</span>
                    </div>
                </div>
            </div>

            <div class="main-right">
                <div class="import-right-placeholder" id="import-right-placeholder">
                    解析后的记录将显示在此处
                </div>
                <div class="import-records-wrapper hidden" id="import-records-wrapper">
                    <div class="import-records-header">
                        <span>共解析到 <span class="import-records-count" id="dns-import-count">0</span> 条记录</span>
                        <span id="import-skip-info" class="import-skip-info"></span>
                    </div>
                    <div class="import-records-list" id="dns-import-preview-list"></div>
                    <div class="import-actions">
                        <span id="import-action-info" class="import-skip-info"></span>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button class="btn btn-ghost" onclick="cancelImport()">取消</button>
                            <button class="btn btn-primary" onclick="confirmImport()">确认导入</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 阻塞弹窗 -->
    <div class="block-overlay" id="block-overlay">
        <div class="block-modal">
            <span class="loading-spinner"></span>
            <span class="block-modal-text" id="block-modal-text">处理中...</span>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
    var currentProvider = '';
    var currentDomain = '';
    var currentDomainId = '';
    var importImageBase64 = '';
    var aiParseRunId = '';
    var aiPollTimer = null;
    var aiParsedRecords = [];
    var providerStatus = {};
    var isImporting = false;
    var isParsing = false;
    var importResults = []; // 存储导入结果
    var existingRecordsCache = {}; // domain(lower) -> { provider, keys, rows }
    var importSessionId = '';
    var importLogFilePath = '';

    var PROVIDER_NAMES = { ali: '阿里云', dnspod: 'DNSPod', tencent: '腾讯云' };

    function newImportSessionId() {
        return 'w' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
    }

    function appendUiLog(line) {
        var logEl = document.getElementById('dns-import-log-output');
        if (!logEl) return;
        logEl.textContent += line + '\n';
        logEl.scrollTop = logEl.scrollHeight;
    }

    function logImport(phase, message, detail, success) {
        if (!importSessionId) return;
        api('POST', '/api/dns/import-log', {
            session_id: importSessionId,
            phase: phase || 'info',
            message: message || '',
            detail: detail || {},
            source: 'web',
            success: success !== false
        }).catch(function () {});
        appendUiLog('[' + (phase || 'info').toUpperCase() + '] ' + (message || ''));
    }

    function loadImportLogInfo() {
        api('GET', '/api/dns/import-log/info').then(function (res) {
            var el = document.getElementById('import-log-path');
            if (!el) return;
            if (res.success && res.data) {
                importLogFilePath = res.data.path || '';
                el.textContent = importLogFilePath || '未创建';
                el.title = importLogFilePath;
            } else {
                el.textContent = '获取失败';
            }
        }).catch(function () {
            var el = document.getElementById('import-log-path');
            if (el) el.textContent = '获取失败';
        });
    }

    function showToast(msg, type) {
        type = type || 'info';
        var c = document.getElementById('toast-container'); if (!c) return;
        var t = document.createElement('div'); t.className = 'toast toast-' + type; t.textContent = msg; c.appendChild(t);
        requestAnimationFrame(function () { t.classList.add('toast-show'); });
        setTimeout(function () { t.classList.remove('toast-show'); t.classList.add('toast-hide'); t.addEventListener('transitionend', function () { if (t.parentNode) t.parentNode.removeChild(t); }); }, 3000);
    }

    function api(method, url, body) {
        var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
        if (body !== undefined) opts.body = JSON.stringify(body);
        return fetch(url, opts).then(function (r) { return r.json(); });
    }

    function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showBlock(text) {
        document.getElementById('block-modal-text').textContent = text || '处理中...';
        document.getElementById('block-overlay').classList.add('block-active');
    }
    function hideBlock() {
        document.getElementById('block-overlay').classList.remove('block-active');
    }

    function loadProviderStatus() {
        return api('GET', '/api/dns/providers').then(function (res) {
            if (res.success) providerStatus = res.data || {};
        }).catch(function () {});
    }

    function getActiveProviders() {
        return ['ali', 'dnspod', 'tencent'].filter(function (p) { return providerStatus[p]; });
    }

    function assignFallbackProviders() {
        var active = getActiveProviders();
        if (active.length !== 1) return;
        aiParsedRecords.forEach(function (rec) {
            if (!rec._provider) rec._provider = active[0];
        });
    }

    function normalizeValueForCompare(value) {
        var v = String(value || '').trim();
        if (v.length >= 2 && ((v[0] === '"' && v[v.length - 1] === '"') || (v[0] === "'" && v[v.length - 1] === "'"))) {
            v = v.slice(1, -1);
        }
        return v;
    }

    function normalizeRrForCompare(rr, domain) {
        rr = String(rr || '').trim();
        if (!rr || rr === '@') return '@';
        var domainLower = String(domain || '').trim().toLowerCase().replace(/\.$/, '');
        if (!domainLower) return rr.toLowerCase();
        if (rr.toLowerCase() === domainLower) return '@';
        var suffix = '.' + domainLower;
        if (rr.toLowerCase().endsWith(suffix)) {
            rr = rr.slice(0, -suffix.length).replace(/\.$/, '');
        }
        return (rr || '@').toLowerCase();
    }

    function importRecordKey(rec) {
        var domain = String(rec.domain || '').trim();
        return [
            domain.toLowerCase(),
            String(rec.type || '').trim().toUpperCase(),
            normalizeRrForCompare(rec.rr || '@', domain),
            normalizeValueForCompare(rec.value)
        ].join('|');
    }

    function markBatchDuplicates(records) {
        var seen = {};
        records.forEach(function (rec) {
            if (rec._status && rec._status !== 'new') return;
            var key = importRecordKey(rec);
            if (seen[key]) {
                rec._status = 'duplicate';
                rec._skip = true;
            } else {
                seen[key] = true;
            }
        });
    }

    function applyCheckStatus(rec, status) {
        status = status || 'new';
        if (rec._status === 'duplicate' && status === 'new') return;
        rec._status = status;
        if (status === 'exists' || status === 'conflict' || status === 'duplicate') rec._skip = true;
    }

    function recordCompareKey(domain, type, rr, value) {
        domain = String(domain || '').trim();
        return [
            domain.toLowerCase(),
            String(type || '').trim().toUpperCase(),
            normalizeRrForCompare(rr || '@', domain),
            normalizeValueForCompare(value)
        ].join('|');
    }

    function getRecordExistenceStatus(rec, keySetByDomain) {
        var domain = String(rec.domain || currentDomain || '').trim();
        if (!domain) return 'new';
        var set = keySetByDomain[domain.toLowerCase()];
        if (!set) return 'new';
        var key = recordCompareKey(domain, rec.type, rec.rr, rec.value);
        if (set.exact && set.exact[key]) return 'exists';
        var tr = String(rec.type || '').toUpperCase() + '|' + normalizeRrForCompare(rec.rr || '@', domain);
        if (set.typeRr && set.typeRr[tr]) return 'conflict';
        return 'new';
    }

    function fetchAllRecordsForDomain(provider, domain) {
        var cacheKey = provider + '|' + String(domain || '').trim().toLowerCase();
        if (existingRecordsCache[cacheKey]) {
            return Promise.resolve(existingRecordsCache[cacheKey]);
        }
        var page = 1;
        var pageSize = 500;
        var rows = [];
        function fetchPage() {
            var url = '/api/dns/records/' + provider
                + '?domain=' + encodeURIComponent(domain)
                + '&page=' + page + '&page_size=' + pageSize;
            return api('GET', url).then(function (res) {
                if (!res.success) return Promise.reject(new Error(res.message || '加载现有记录失败'));
                var payload = res.data || {};
                var records = payload.records || [];
                var pg = payload.pagination || {};
                records.forEach(function (rec) {
                    rows.push({
                        type: String(rec.Type || '').toUpperCase(),
                        rr: normalizeRrForCompare(rec.RR, domain),
                        value: normalizeValueForCompare(rec.Value)
                    });
                });
                var totalPages = parseInt(pg.total_pages, 10) || Math.max(1, Math.ceil((parseInt(pg.total, 10) || rows.length) / pageSize));
                if (page < totalPages) {
                    page += 1;
                    return fetchPage();
                }
                var exact = {};
                var typeRr = {};
                rows.forEach(function (row) {
                    exact[recordCompareKey(domain, row.type, row.rr, row.value)] = true;
                    var tr = row.type + '|' + row.rr;
                    typeRr[tr] = true;
                });
                var lookup = { exact: exact, typeRr: typeRr, rows: rows };
                existingRecordsCache[cacheKey] = lookup;
                return lookup;
            });
        }
        return fetchPage();
    }

    function ensureExistingRecordsForImport(records) {
        var pairs = {};
        (records || []).forEach(function (rec) {
            var d = String(rec.domain || currentDomain || '').trim();
            var p = rec._provider || currentProvider || '';
            if (!d || !p) return;
            var k = p + '|' + d.toLowerCase();
            if (!pairs[k]) pairs[k] = { provider: p, domain: d };
        });
        var keys = Object.keys(pairs);
        if (!keys.length) return Promise.resolve({});
        return Promise.all(keys.map(function (k) {
            var item = pairs[k];
            return fetchAllRecordsForDomain(item.provider, item.domain).then(function (lookup) {
                return { domain: item.domain, lookup: lookup };
            });
        })).then(function (results) {
            var keySetByDomain = {};
            results.forEach(function (r) {
                keySetByDomain[r.domain.toLowerCase()] = r.lookup;
            });
            return keySetByDomain;
        });
    }

    // ==================== 本地快速解析 ====================
    function extractJsonArrayFromText(text) {
        var raw = String(text || '').trim();
        if (!raw) return null;
        try {
            var parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) return parsed;
            if (parsed && Array.isArray(parsed.records)) return parsed.records;
        } catch (e1) { /* continue */ }
        var start = raw.indexOf('[');
        var end = raw.lastIndexOf(']');
        if (start >= 0 && end > start) {
            try { return JSON.parse(raw.slice(start, end + 1)); } catch (e2) { /* ignore */ }
        }
        return null;
    }

    function isJsonDnsRecordsText(text) {
        var arr = extractJsonArrayFromText(text);
        return !!(arr && arr.length);
    }

    function normalizeDnsRecordType(raw) {
        var s = String(raw || '').toUpperCase().replace(/\s+/g, '');
        if (!s) return '';
        var types = ['TXT', 'AAAA', 'CNAME', 'MX', 'NS', 'SRV', 'CAA'];
        for (var i = 0; i < types.length; i++) {
            if (s.indexOf(types[i]) !== -1) return types[i];
        }
        if (s === 'A' || s.indexOf('A记录') !== -1) return 'A';
        return ['A', 'AAAA', 'CNAME', 'MX', 'TXT', 'NS', 'SRV', 'CAA'].indexOf(s) !== -1 ? s : '';
    }

    function normalizeVerifyDomainColumn(rec) {
        if (!rec || typeof rec !== 'object') return rec;
        var raw = String(rec.domain || '').trim().replace(/\.$/, '');
        if (!raw) return rec;
        var parts = raw.split('.').filter(Boolean);
        if (parts.length >= 3) {
            rec.verifyHost = raw;
            rec.domain = parts.slice(-2).join('.');
        } else if (parts.length === 2) {
            rec.domain = raw;
        }
        return rec;
    }

    function extractDomainsFromDnsProse(text) {
        var found = [];
        var seen = {};
        function addDomain(raw) {
            var d = String(raw || '').trim().replace(/\.$/, '').toLowerCase();
            if (!d || seen[d]) return;
            if (!/^[a-z0-9][\w.-]*\.[a-z]{2,}$/i.test(d)) return;
            seen[d] = true;
            found.push(d);
        }
        var patterns = [
            /请前往域名\s*[「"'\s]*([a-zA-Z0-9][\w.-]*\.[a-zA-Z]{2,})/gi,
            /域名为?\s*[「"'\s]*([a-zA-Z0-9][\w.-]*\.[a-zA-Z]{2,})/gi,
            /域名\s*[「"'\s]*([a-zA-Z0-9][\w.-]*\.[a-zA-Z]{2,})/gi
        ];
        patterns.forEach(function (re) {
            var m;
            while ((m = re.exec(text)) !== null) addDomain(m[1]);
        });
        var fqdnRe = /(?:[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}/g;
        var fm;
        while ((fm = fqdnRe.exec(text)) !== null) addDomain(fm[0]);
        found.sort(function (a, b) { return b.length - a.length; });
        return found;
    }

    function enrichDnsImportRecordsDomains(records, text) {
        var hints = extractDomainsFromDnsProse(text);
        if (!hints.length) return records;
        var lowText = String(text || '').toLowerCase();
        var defaultDomain = hints[0];
        (records || []).forEach(function (rec) {
            if (String(rec.domain || '').trim()) return;
            var rr = String(rec.rr || '').trim();
            var matched = '';
            for (var i = 0; i < hints.length; i++) {
                var d = hints[i];
                var candidates = [];
                if (rr && rr !== '@') {
                    candidates.push(rr + '.' + d);
                    if (rr.indexOf('_dnsauth.') === 0) {
                        var sub = rr.split('.').slice(1).join('.');
                        if (sub) candidates.push(sub + '.' + d);
                    }
                }
                for (var c = 0; c < candidates.length; c++) {
                    if (lowText.indexOf(candidates[c].toLowerCase()) !== -1) {
                        matched = d;
                        break;
                    }
                }
                if (matched) break;
            }
            rec.domain = matched || defaultDomain;
        });
        return records;
    }

    function normalizeDnsImportItems(items) {
        var records = [];
        (items || []).forEach(function (item) {
            if (!item || typeof item !== 'object') return;
            var rtype = normalizeDnsRecordType(item.type || item.Type || item.record_type || 'A');
            if (!rtype) return;
            var value = String(item.value || item.Value || '').trim();
            if (!value) return;
            records.push(normalizeVerifyDomainColumn({
                type: rtype,
                rr: String(item.rr || item.RR || item.name || item.Name || '@').trim() || '@',
                value: value,
                ttl: parseInt(item.ttl || item.TTL, 10) || 600,
                domain: String(item.domain || item.Domain || '').trim()
            }));
        });
        return records;
    }

    function parseConsoleTableDnsText(text) {
        var records = [];
        var headerMarks = ['校验域名', '主机记录', '记录类型', '记录值'];
        var lines = String(text || '').split('\n');
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line || line.indexOf('#') === 0) continue;
            var isHeader = false;
            for (var h = 0; h < headerMarks.length; h++) {
                if (line.indexOf(headerMarks[h]) !== -1 && (line.indexOf('记录') !== -1 || line.indexOf('域名') !== -1)) {
                    isHeader = true;
                    break;
                }
            }
            if (isHeader) continue;
            line = line.replace(/\s*复制\s*/g, ' ').replace(/\s+/g, ' ').trim();
            var domain = '', rr = '', rtypeRaw = '', value = '';
            var rowM = line.match(/^([a-zA-Z0-9][\w.-]*\.[a-zA-Z]{2,})\s+(\S+)\s+(.+?)\s+([A-Za-z0-9][\w.+:/=-]{8,})\s*$/);
            if (rowM) {
                domain = rowM[1].replace(/\.$/, '');
                rr = rowM[2];
                rtypeRaw = rowM[3];
                value = rowM[4];
            } else {
                var cols = line.split(/\t+|\s{2,}/).filter(function (c) { return c && c !== '复制'; });
                if (cols.length < 3) cols = line.split(/\s+/).filter(function (c) { return c !== '复制'; });
                if (cols.length < 3) continue;
                if (/^[a-zA-Z0-9][\w.-]*\.[a-zA-Z]{2,}$/.test(cols[0])) {
                    domain = cols[0].replace(/\.$/, '');
                    rr = cols[1];
                    rtypeRaw = cols[2];
                    value = cols[cols.length - 1];
                } else {
                    rr = cols[0];
                    rtypeRaw = cols[1];
                    value = cols[cols.length - 1];
                }
            }
            var rtype = normalizeDnsRecordType(rtypeRaw);
            if (!rtype || !value) continue;
            records.push(normalizeVerifyDomainColumn({
                type: rtype, rr: rr || '@', value: value, ttl: 600, domain: domain
            }));
        }
        enrichDnsImportRecordsDomains(records, text);
        return records;
    }

    function beginValidationFlow(records, sourceLabel) {
        aiParsedRecords = records || [];
        importResults = [];
        if (!aiParsedRecords.length) {
            logImport('parse_fail', '未能解析到有效记录', { parse_source: sourceLabel || 'local' }, false);
            showToast('未能解析到有效的 DNS 记录', 'error');
            isParsing = false;
            document.getElementById('btn-dns-import-parse').disabled = false;
            hideBlock();
            return;
        }
        logImport('parse_done', sourceLabel || '解析完成', {
            parse_source: sourceLabel || 'local',
            records_count: aiParsedRecords.length,
            records: aiParsedRecords
        });
        var logSection = document.getElementById('dns-import-log-section');
        logSection.classList.remove('hidden');
        var logEl = document.getElementById('dns-import-log-output');
        if (sourceLabel) {
            logEl.textContent += '[INFO] ' + sourceLabel + '，共 ' + aiParsedRecords.length + ' 条\n';
        }
        document.getElementById('import-right-placeholder').classList.remove('hidden');
        document.getElementById('import-records-wrapper').classList.add('hidden');
        showBlock('校验中...');
        autoDetectAndCheck();
    }

    function runDnsImportParse() {
        if (isParsing) {
            showToast('解析任务进行中，请勿重复点击', 'info');
            return;
        }
        var text = document.getElementById('dns-import-text').value.trim();
        if (!text && !importImageBase64) {
            showToast('请先粘贴控制台文字、JSON 或截图', 'error');
            return;
        }

        importSessionId = newImportSessionId();
        document.getElementById('dns-import-log-section').classList.remove('hidden');
        document.getElementById('dns-import-log-output').textContent = '';
        logImport('session_start', '开始导入会话', {
            has_image: !!importImageBase64,
            text_len: text.length,
            log_file: importLogFilePath
        });

        if (text && isJsonDnsRecordsText(text)) {
            isParsing = true;
            document.getElementById('btn-dns-import-parse').disabled = true;
            var jsonRecords = normalizeDnsImportItems(extractJsonArrayFromText(text));
            enrichDnsImportRecordsDomains(jsonRecords, text);
            beginValidationFlow(jsonRecords, 'JSON 快速解析');
            return;
        }

        if (text) {
            var localRows = parseConsoleTableDnsText(text);
            if (localRows.length) {
                isParsing = true;
                document.getElementById('btn-dns-import-parse').disabled = true;
                var localRecords = normalizeDnsImportItems(localRows);
                beginValidationFlow(localRecords, '表格快速解析');
                return;
            }
        }

        startAiParse();
    }

    // ==================== AI 解析 ====================
    function loadAiConfig() {
        api('GET', '/api/dns/ai/config').then(function (res) {
            if (!res.success) return;
            var cfg = res.data || {};
            var statusEl = document.getElementById('ai-config-api-status');
            var modelEl = document.getElementById('ai-config-model');
            var enabledEl = document.getElementById('ai-config-enabled');
            if (cfg.has_api_key) { statusEl.textContent = '已配置'; statusEl.className = 'ai-config-status-value configured'; }
            else { statusEl.textContent = '未配置'; statusEl.className = 'ai-config-status-value not-configured'; }
            modelEl.textContent = cfg.effective_model_label || cfg.cursor_model || '-';
            if (cfg.enabled === false) { enabledEl.textContent = '已禁用'; enabledEl.className = 'ai-config-status-value not-configured'; }
            else { enabledEl.textContent = '已启用'; enabledEl.className = 'ai-config-status-value configured'; }
        });
    }

    function startAiParse() {
        if (isParsing) return;
        var text = document.getElementById('dns-import-text').value.trim();
        if (!text && !importImageBase64) { showToast('请粘贴文本或图片后再识别', 'error'); return; }
        if (!importSessionId) importSessionId = newImportSessionId();
        isParsing = true;
        showBlock('AI 识别中...');
        logImport('parse_start', '启动 AI 解析', { has_image: !!importImageBase64, text_len: text.length });
        document.getElementById('btn-dns-import-parse').disabled = true;
        var logSection = document.getElementById('dns-import-log-section');
        logSection.classList.remove('hidden');
        document.getElementById('dns-import-log-output').textContent = '正在启动识别...\n';
        document.getElementById('import-right-placeholder').classList.remove('hidden');
        document.getElementById('import-records-wrapper').classList.add('hidden');
        aiParsedRecords = [];
        importResults = [];

        api('POST', '/api/dns/ai/parse', {
            text: text,
            image_base64: importImageBase64,
            domain_hint: currentDomain || '',
            session_id: importSessionId
        }).then(function (res) {
            document.getElementById('btn-dns-import-parse').disabled = false;
            if (!res.success) {
                document.getElementById('dns-import-log-output').textContent += '[ERROR] ' + (res.message || '启动失败') + '\n';
                isParsing = false; hideBlock(); return;
            }
            aiParseRunId = res.data.run_id;
            if (res.data.session_id) importSessionId = res.data.session_id;
            aiPollSeq = 0;
            pollAiParse();
        }).catch(function (e) {
            document.getElementById('btn-dns-import-parse').disabled = false;
            document.getElementById('dns-import-log-output').textContent += '[ERROR] ' + e.message + '\n';
            isParsing = false; hideBlock();
        });
    }

    var aiPollSeq = 0;
    function pollAiParse() {
        if (!aiParseRunId) return;
        if (aiPollTimer) clearTimeout(aiPollTimer);
        api('GET', '/api/dns/ai/parse/' + aiParseRunId + '?since_seq=' + aiPollSeq + '&limit=200').then(function (res) {
            if (!res.success) { aiPollTimer = setTimeout(pollAiParse, 1500); return; }
            var data = res.data || {};
            var lines = data.lines || [];
            if (lines.length) {
                var logEl = document.getElementById('dns-import-log-output');
                lines.forEach(function (l) { logEl.textContent += l; });
                logEl.scrollTop = logEl.scrollHeight;
            }
            aiPollSeq = data.next_seq || aiPollSeq;
            if (data.done) {
                document.getElementById('btn-dns-import-parse').disabled = false;
                if (data.records && data.records.length) {
                    aiParsedRecords = data.records;
                    showBlock('校验中...');
                    autoDetectAndCheck();
                } else {
                    logImport('parse_fail', data.message || '未能解析出记录', { run_id: aiParseRunId }, false);
                    showToast(data.message || '未能解析出记录', 'error');
                    isParsing = false; hideBlock();
                }
                return;
            }
            aiPollTimer = setTimeout(pollAiParse, 1200);
        });
    }

    function autoDetectAndCheck() {
        showBlock('校验中...');
        logImport('check_start', '开始服务商识别与存在性校验', { records_count: aiParsedRecords.length });
        var domains = {};
        aiParsedRecords.forEach(function (rec) {
            var d = (rec.domain || '').trim();
            if (d) domains[d.toLowerCase()] = true;
        });
        var domainList = Object.keys(domains);
        if (!domainList.length) {
            markBatchDuplicates(aiParsedRecords);
            renderImportPreview();
            isParsing = false;
            document.getElementById('btn-dns-import-parse').disabled = false;
            hideBlock();
            return;
        }

        var detectPromises = domainList.map(function (d) {
            return api('GET', '/api/dns/detect?domain=' + encodeURIComponent(d)).then(function (res) {
                return { domain: d, res: res };
            }).catch(function () { return { domain: d, res: { success: false } }; });
        });

        Promise.all(detectPromises).then(function (results) {
            var providerMap = {};
            results.forEach(function (r) {
                if (r.res.success && r.res.data && r.res.data.provider) {
                    providerMap[r.domain] = r.res.data.provider;
                }
            });

            aiParsedRecords.forEach(function (rec) {
                var d = (rec.domain || '').trim().toLowerCase();
                if (d && providerMap[d]) {
                    rec._provider = providerMap[d];
                }
            });

            logImport('detect_done', '服务商识别完成', { provider_map: providerMap });
            assignFallbackProviders();
            checkRecordsExistence(providerMap);
        });
    }

    function checkRecordsExistence(providerMap) {
        showBlock('校验中...');
        markBatchDuplicates(aiParsedRecords);
        aiParsedRecords.forEach(function (rec) {
            if (!rec._status) rec._status = 'new';
        });

        document.getElementById('import-right-placeholder').classList.add('hidden');
        document.getElementById('import-records-wrapper').classList.remove('hidden');
        document.getElementById('dns-import-count').textContent = aiParsedRecords.length;

        var hasProvider = aiParsedRecords.some(function (rec) {
            return !!(rec._provider || currentProvider);
        });

        if (!hasProvider) {
            var logEl = document.getElementById('dns-import-log-output');
            if (logEl) {
                logEl.textContent += '\n[CHECK] 未检测到服务商，仅校验批次内重复\n';
                logEl.scrollTop = logEl.scrollHeight;
            }
            logImport('check_done', '无域名，仅校验批次内重复', { records: aiParsedRecords });
            markBatchDuplicates(aiParsedRecords);
            renderImportPreview();
            isParsing = false;
            document.getElementById('btn-dns-import-parse').disabled = false;
            hideBlock();
            return;
        }

        ensureExistingRecordsForImport(aiParsedRecords).then(function (keySetByDomain) {
            var checkResults = [];
            aiParsedRecords.forEach(function (rec) {
                if (rec._status === 'duplicate') return;
                var status = getRecordExistenceStatus(rec, keySetByDomain);
                if (status !== 'new') applyCheckStatus(rec, status);
                else if (!rec._status) rec._status = 'new';
                checkResults.push({
                    domain: rec.domain,
                    type: rec.type,
                    rr: rec.rr,
                    value: rec.value,
                    status: rec._status || 'new',
                    provider: rec._provider || ''
                });
            });
            markBatchDuplicates(aiParsedRecords);
            appendExistenceLog();
            logImport('check_done', '存在性校验完成', {
                records: aiParsedRecords,
                check_results: checkResults
            });
            var skipCount = aiParsedRecords.filter(function (r) { return r._skip; }).length;
            if (skipCount > 0) {
                showToast('发现 ' + skipCount + ' 条重复/已存在记录，已自动标记跳过', 'info');
            }
            renderImportPreview();
            isParsing = false;
            document.getElementById('btn-dns-import-parse').disabled = false;
            hideBlock();
        }).catch(function (err) {
            logImport('check_fail', '存在性校验失败', { error: err.message || String(err) }, false);
            var logEl2 = document.getElementById('dns-import-log-output');
            if (logEl2) {
                logEl2.textContent += '\n[CHECK] 存在性检测失败: ' + (err.message || err) + '\n';
                logEl2.scrollTop = logEl2.scrollHeight;
            }
            showToast('校验重复记录失败: ' + (err.message || err), 'error');
            markBatchDuplicates(aiParsedRecords);
            renderImportPreview();
            isParsing = false;
            document.getElementById('btn-dns-import-parse').disabled = false;
            hideBlock();
        });
    }

    var statusLabels = {
        exists: '已存在',
        conflict: '冲突',
        duplicate: '重复',
        'new': '新增',
        imported: '已导入',
        failed: '失败'
    };

    function appendExistenceLog() {
        var logEl = document.getElementById('dns-import-log-output');
        if (!logEl || !aiParsedRecords.length) return;
        var newCount = 0, existsCount = 0, conflictCount = 0, dupCount = 0;
        aiParsedRecords.forEach(function (rec) {
            var s = rec._status || 'new';
            if (s === 'new') newCount++;
            else if (s === 'exists') existsCount++;
            else if (s === 'conflict') conflictCount++;
            else if (s === 'duplicate') dupCount++;
        });
        var lines = '\n[CHECK] 存在性检测完成：新增 ' + newCount + ' 条，已存在 ' + existsCount + ' 条';
        if (conflictCount) lines += '，冲突 ' + conflictCount + ' 条';
        if (dupCount) lines += '，批次内重复 ' + dupCount + ' 条';
        lines += '\n';
        logEl.textContent += lines;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function renderImportPreview() {
        document.getElementById('import-right-placeholder').classList.add('hidden');
        document.getElementById('import-records-wrapper').classList.remove('hidden');
        document.getElementById('dns-import-count').textContent = aiParsedRecords.length;

        var skipCount = aiParsedRecords.filter(function (r) { return r._skip; }).length;
        var importCount = aiParsedRecords.length - skipCount;
        var skipInfo = skipCount > 0 ? '将跳过 ' + skipCount + ' 条（已存在/冲突/重复）' : '';
        document.getElementById('import-skip-info').textContent = skipInfo;
        document.getElementById('import-action-info').textContent = importCount > 0 ? '将导入 ' + importCount + ' 条记录' : '没有需要导入的记录';

        var list = document.getElementById('dns-import-preview-list');
        list.innerHTML = '';
        aiParsedRecords.forEach(function (rec, idx) {
            var status = rec._status || 'new';
            var skipped = !!rec._skip;
            var card = document.createElement('div');
            var isDupStatus = status === 'exists' || status === 'conflict' || status === 'duplicate';
            card.className = 'dns-import-card' + (skipped ? ' record-skipped' : '') + (isDupStatus ? ' is-duplicate' : '');
            card.dataset.idx = idx;
            card.innerHTML =
                '<div class="dns-import-card-header">' +
                    '<label class="skip-checkbox"><input type="checkbox" data-idx="' + idx + '" data-field="skip"' + (skipped ? ' checked' : '') + ' onchange="toggleSkipRecord(' + idx + ', this.checked)"> 跳过</label>' +
                    '<span class="status-badge status-' + status + '">' + (statusLabels[status] || status) + '</span>' +
                '</div>' +
                '<div class="dns-import-row">' +
                    '<div class="dns-import-field"><label>域名</label><input class="form-input" data-idx="' + idx + '" data-field="domain" value="' + escHtml(rec.domain || '') + '"></div>' +
                    '<div class="dns-import-field"><label>主机记录</label><input class="form-input" data-idx="' + idx + '" data-field="rr" value="' + escHtml(rec.rr || '@') + '"></div>' +
                '</div>' +
                '<div class="dns-import-row dns-import-row-2">' +
                    '<div class="dns-import-field"><label>类型</label><select class="form-select" data-idx="' + idx + '" data-field="type">' +
                        ['A','AAAA','CNAME','MX','TXT','NS','SRV','CAA'].map(function(t) { return '<option value="' + t + '"' + (rec.type === t ? ' selected' : '') + '>' + t + '</option>'; }).join('') +
                    '</select></div>' +
                    '<div class="dns-import-field"><label>记录值</label><input class="form-input" data-idx="' + idx + '" data-field="value" value="' + escHtml(rec.value || '') + '"></div>' +
                    '<div class="dns-import-field"><label>TTL</label><input class="form-input" data-idx="' + idx + '" data-field="ttl" value="' + (rec.ttl || 600) + '" type="number"></div>' +
                    '<div class="dns-import-field-action"><button class="btn btn-danger btn-sm" onclick="removeImportRecord(' + idx + ')">✕</button></div>' +
                '</div>';
            list.appendChild(card);
        });
    }

    function toggleSkipRecord(idx, skipped) {
        aiParsedRecords[idx]._skip = skipped;
        var card = document.querySelectorAll('.dns-import-card')[idx];
        if (card) card.classList.toggle('record-skipped', skipped);
        var skipCount = aiParsedRecords.filter(function (r) { return r._skip; }).length;
        var importCount = aiParsedRecords.length - skipCount;
        document.getElementById('import-skip-info').textContent = skipCount > 0 ? '将跳过 ' + skipCount + ' 条（已存在/冲突/重复）' : '';
        document.getElementById('import-action-info').textContent = importCount > 0 ? '将导入 ' + importCount + ' 条记录' : '没有需要导入的记录';
    }

    function removeImportRecord(idx) {
        syncImportEdits();
        aiParsedRecords.splice(idx, 1);
        renderImportPreview();
    }

    function syncImportEdits() {
        document.querySelectorAll('#dns-import-preview-list [data-idx]').forEach(function (el) {
            var idx = parseInt(el.dataset.idx), field = el.dataset.field;
            if (field === 'skip') { if (aiParsedRecords[idx]) aiParsedRecords[idx]._skip = el.checked; return; }
            if (aiParsedRecords[idx]) aiParsedRecords[idx][field] = el.value;
        });
    }

    function cancelImport() {
        document.getElementById('import-records-wrapper').classList.add('hidden');
        document.getElementById('import-right-placeholder').classList.remove('hidden');
        document.getElementById('import-result-summary').classList.add('hidden');
        aiParsedRecords = [];
        importResults = [];
    }

    function clearImportResult() {
        document.getElementById('import-result-summary').classList.add('hidden');
    }

    function confirmImport() {
        if (isImporting) return;
        syncImportEdits();
        var draftRecords = aiParsedRecords.filter(function (rec) { return !rec._skip; });
        if (!draftRecords.length) { showToast('没有可导入的记录', 'error'); return; }

        isImporting = true;
        showBlock('校验中...');
        importResults = [];
        logImport('import_start', '开始确认导入', { draft_count: draftRecords.length, records: draftRecords });

        ensureExistingRecordsForImport(draftRecords).then(function (keySetByDomain) {
            var recordsToImport = [];
            var skipDupCount = 0;
            draftRecords.forEach(function (rec) {
                if (rec._status === 'duplicate') {
                    skipDupCount++;
                    return;
                }
                if (getRecordExistenceStatus(rec, keySetByDomain) === 'exists') {
                    skipDupCount++;
                    return;
                }
                recordsToImport.push(rec);
            });
            if (!recordsToImport.length) {
                logImport('import_done', '全部为重复，未执行导入', {
                    skip_dup_count: skipDupCount,
                    draft_count: draftRecords.length
                });
                isImporting = false;
                hideBlock();
                showToast(skipDupCount > 0 ? '全部为重复记录，无需导入（共 ' + skipDupCount + ' 条）' : '没有可导入的记录', 'info');
                return;
            }
            if (skipDupCount > 0) {
                showToast('将导入 ' + recordsToImport.length + ' 条，跳过重复 ' + skipDupCount + ' 条', 'info');
            }
            logImport('import_confirm', '导入前校验通过', {
                import_count: recordsToImport.length,
                skip_dup_count: skipDupCount,
                records: recordsToImport
            });
            showBlock('正在导入...');
            return doConfirmImportRecords(recordsToImport);
        }).catch(function (err) {
            logImport('import_fail', '导入前校验失败', { error: err.message || String(err) }, false);
            isImporting = false;
            hideBlock();
            showToast('校验重复记录失败: ' + (err.message || err), 'error');
        });
    }

    function doConfirmImportRecords(recordsToImport) {
        var byProvider = {};
        recordsToImport.forEach(function (rec) {
            var p = rec._provider || currentProvider || '';
            if (!byProvider[p]) byProvider[p] = [];
            byProvider[p].push(rec);
        });

        var allPromises = [];
        Object.keys(byProvider).forEach(function (p) {
            if (!p) return;
            byProvider[p].forEach(function (rec) {
                allPromises.push(
                    api('POST', '/api/dns/records/' + p, {
                        type: rec.type, rr: rec.rr, value: rec.value, ttl: rec.ttl || 600,
                        line: 'default', domain: rec.domain || currentDomain,
                        session_id: importSessionId
                    }).then(function (res) {
                        var result = {
                            provider: p,
                            domain: rec.domain || currentDomain,
                            type: rec.type,
                            rr: rec.rr,
                            value: rec.value,
                            success: res.success,
                            message: res.message || ''
                        };
                        importResults.push(result);
                        return result;
                    }).catch(function () {
                        var result = {
                            provider: p,
                            domain: rec.domain || currentDomain,
                            type: rec.type,
                            rr: rec.rr,
                            value: rec.value,
                            success: false,
                            message: '网络错误'
                        };
                        importResults.push(result);
                        return result;
                    })
                );
            });
        });

        if (!allPromises.length) { showToast('没有可导入的记录（缺少服务商）', 'error'); isImporting = false; hideBlock(); return Promise.resolve(); }

        return Promise.all(allPromises).then(function (results) {
            var ok = 0, fail = 0;
            results.forEach(function (r) {
                if (r.success) {
                    ok++;
                    var d = String(r.domain || '').toLowerCase();
                    Object.keys(existingRecordsCache).forEach(function (k) {
                        if (k.indexOf('|' + d) !== -1) delete existingRecordsCache[k];
                    });
                } else {
                    fail++;
                }
            });
            showToast('导入完成：成功 ' + ok + ' 条' + (fail ? '，失败 ' + fail + ' 条' : ''), fail ? 'error' : 'success');
            logImport('import_done', '导入完成', {
                success_count: ok,
                fail_count: fail,
                results: results,
                log_file: importLogFilePath
            }, fail === 0);
            isImporting = false;
            hideBlock();
        }).catch(function (err) {
            logImport('import_fail', '导入异常', { error: err.message || String(err) }, false);
            isImporting = false;
            hideBlock();
        });
    }

    // ==================== 图片拖拽/粘贴 ====================
    (function initImageDrop() {
        var dropzone = document.getElementById('dns-import-dropzone');
        var preview = document.getElementById('dns-import-image-preview');
        var fileInput = document.getElementById('dns-import-file-input');

        function setImage(dataUrl) { importImageBase64 = dataUrl; preview.src = dataUrl; dropzone.classList.add('has-image'); }
        function clearImage() { importImageBase64 = ''; preview.src = ''; dropzone.classList.remove('has-image'); }

        dropzone.addEventListener('dragover', function (e) { e.preventDefault(); dropzone.classList.add('is-dragover'); });
        dropzone.addEventListener('dragleave', function () { dropzone.classList.remove('is-dragover'); });
        dropzone.addEventListener('drop', function (e) {
            e.preventDefault(); dropzone.classList.remove('is-dragover');
            var file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) { var reader = new FileReader(); reader.onload = function (ev) { setImage(ev.target.result); }; reader.readAsDataURL(file); }
        });

        document.addEventListener('paste', function (e) {
            var items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (var i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    var blob = items[i].getAsFile(); var reader = new FileReader();
                    reader.onload = function (ev) { setImage(ev.target.result); }; reader.readAsDataURL(blob);
                    break;
                }
            }
        });

        document.getElementById('btn-dns-import-pick-image').addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function () {
            if (fileInput.files[0]) { var reader = new FileReader(); reader.onload = function (ev) { setImage(ev.target.result); }; reader.readAsDataURL(fileInput.files[0]); }
        });
        document.getElementById('btn-dns-import-clear-image').addEventListener('click', clearImage);
    })();

    // ==================== 初始化 ====================
    loadProviderStatus();
    loadAiConfig();
    loadImportLogInfo();
    </script>
</body>
